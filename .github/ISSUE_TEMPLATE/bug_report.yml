name: Bug Report
description: Report a problem with setup, scripts, or tooling.
labels: [bug]
body:
  - type: dropdown
    id: macos_version
    attributes:
      label: macOS Version
      options:
        - Sequoia 15
        - Sonoma 14
        - Ventura 13
    validations:
      required: true

  - type: input
    id: homebrew_version
    attributes:
      label: Homebrew Version
      description: Output of `brew --version`
      placeholder: "Homebrew 4.x.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run `bash setup.sh`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant Output
      description: Terminal output, error messages, log snippets.
      render: shell
    validations:
      required: false
