name: Feature Request
description: Propose a new tool, script, or workflow improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What friction or gap does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should change and how should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you evaluated and why they were ruled out.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, examples, prior art, or anything else relevant.
    validations:
      required: false
