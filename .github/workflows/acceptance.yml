name: VM Acceptance Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to test'
        required: false
        default: 'main'
  push:
    tags: ['v*.*.*']
  workflow_call:

permissions:
  contents: read

jobs:
  acceptance:
    name: VM Acceptance
    runs-on: macos-15-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Tart images
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.tart
          key: tart-sequoia-base-${{ hashFiles('scripts/vm-acceptance-test.sh') }}
          restore-keys: tart-sequoia-base-

      - name: Install Tart
        run: |
          brew install cirruslabs/cli/tart

      - name: Install sshpass
        run: brew install hudochenkov/sshpass/sshpass

      - name: Run VM acceptance test
        run: bash scripts/vm-acceptance-test.sh
        timeout-minutes: 25

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: acceptance-logs-${{ github.run_id }}
          path: /tmp/mac-dev-setup-*.log
          retention-days: 7
