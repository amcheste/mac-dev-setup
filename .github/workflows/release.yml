name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Gate: run full validation before cutting a release ────────────────────
  validate:
    name: Validate Before Release
    uses: ./.github/workflows/validate.yml

  # ── Gate: VM acceptance test (stable releases only) ──────────────────────
  # Pre-release tags (e.g. -beta.1, -rc.1) skip this gate — they are
  # explicitly not fully vetted. Stable tags (1.0.0+) require a clean VM
  # install before publishing. A skipped job counts as success for `needs`.
  acceptance:
    name: VM Acceptance
    needs: validate
    if: ${{ !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/acceptance.yml

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, acceptance]
    # Run if validate succeeded AND acceptance either succeeded or was skipped
    # (acceptance is skipped for pre-release tags by design)
    if: ${{ always() && needs.validate.result == 'success' && (needs.acceptance.result == 'success' || needs.acceptance.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME}"                           # e.g. v1.2.0 or v0.1.0-beta.1
          VERSION_FILE=$(cat VERSION)
          if [[ "v${VERSION_FILE}" != "$TAG" ]]; then
            echo "ERROR: Tag $TAG does not match VERSION file (v${VERSION_FILE})"
            exit 1
          fi
          echo "Tag matches VERSION file: $TAG ✓"

      - name: Detect pre-release
        id: prerelease
        run: |
          # Tags with a pre-release identifier (e.g. -beta.1, -rc.2) are marked
          # as pre-releases in GitHub so they don't show as the "latest" release.
          if [[ "${GITHUB_REF_NAME}" =~ v[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z] ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release tag: ${GITHUB_REF_NAME}"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable tag: ${GITHUB_REF_NAME}"
          fi

      - name: Draft release notes
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            git clone https://github.com/amcheste/mac-dev-setup ~/Repos/amcheste/mac-dev-setup
            cd ~/Repos/amcheste/mac-dev-setup && bash setup.sh
            ```

            ## Upgrading an existing installation

            ```bash
            cd ~/Repos/amcheste/mac-dev-setup
            bash scripts/upgrade.sh
            ```

            See [README](https://github.com/amcheste/mac-dev-setup#upgrading-an-existing-install) for full details.
