name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Gate: run full validation before cutting a release ────────────────────
  validate:
    name: Validate Before Release
    uses: ./.github/workflows/validate.yml

  # ── Gate: VM acceptance test ───────────────────────────────────────────────
  acceptance:
    name: VM Acceptance
    needs: validate
    uses: ./.github/workflows/acceptance.yml

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, acceptance]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME}"                           # e.g. v1.2.0
          VERSION_FILE=$(cat VERSION)
          if [[ "v${VERSION_FILE}" != "$TAG" ]]; then
            echo "ERROR: Tag $TAG does not match VERSION file (v${VERSION_FILE})"
            exit 1
          fi
          echo "Tag matches VERSION file: $TAG ✓"

      - name: Draft release notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            git clone https://github.com/amcheste/mac-dev-setup ~/Repos/amcheste/mac-dev-setup
            cd ~/Repos/amcheste/mac-dev-setup && bash setup.sh
            ```

            ## Upgrading an existing installation

            ```bash
            cd ~/Repos/amcheste/mac-dev-setup
            bash scripts/upgrade.sh
            ```

            See [README](https://github.com/amcheste/mac-dev-setup#upgrading-an-existing-install) for full details.
