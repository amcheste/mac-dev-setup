name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Job 1: Lint (fast, runs on Linux) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck setup.sh
          shellcheck scripts/install-dotfiles.sh
          shellcheck scripts/setup-credentials.sh
          shellcheck scripts/upgrade.sh
          shellcheck scripts/bump-version.sh
          shellcheck scripts/acceptance-test.sh
          shellcheck scripts/vm-acceptance-test.sh
          shellcheck scripts/preflight-test.sh

      - name: Verify secrets.template contains no real credentials
        run: |
          echo "Scanning secrets.template for real credentials..."
          # Fail if patterns that look like real keys are found
          if grep -Eq '(sk-ant-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|dop_v1_[a-zA-Z0-9]{64}|ocid1\.[a-z]+\.[a-z]+\.[a-z0-9]+\.[a-z0-9]{60})' dotfiles/secrets.template; then
            echo "ERROR: secrets.template appears to contain real credentials!"
            exit 1
          fi
          echo "secrets.template looks clean ✓"

      - name: Verify .gitignore protects secrets
        run: |
          grep -q '\.secrets' .gitignore || \
            (echo "ERROR: .gitignore does not exclude .secrets" && exit 1)
          echo ".gitignore protects .secrets ✓"

  # ── Job 2: Conventional commits + semver suggestion (PRs only) ────────────
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          PATTERN='^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?(!)?: .+'
          FAIL=0

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            if echo "$msg" | grep -Eq "$PATTERN"; then
              echo "  ✓ $msg"
            else
              echo "  ✗ Non-conventional: $msg"
              FAIL=1
            fi
          done < <(git log --no-merges --format='%s' "${BASE_SHA}..${HEAD_SHA}")

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "Commit messages must follow: <type>[scope][!]: <description>"
            echo "Types: feat fix docs chore refactor test style perf ci build revert"
            exit 1
          fi
          echo "All commit messages are conventional ✓"

      - name: Suggest semver bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          BUMP="patch"
          BREAKING=""
          FEATURES=""

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            if echo "$msg" | grep -Eq '^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?!: '; then
              BREAKING="$BREAKING\n  - $msg"
              BUMP="major"
            elif echo "$msg" | grep -Eq '^feat(\([^)]+\))?: '; then
              FEATURES="$FEATURES\n  - $msg"
              [[ "$BUMP" != "major" ]] && BUMP="minor"
            fi
          done < <(git log --no-merges --format='%s' "${BASE_SHA}..${HEAD_SHA}")

          {
            case $BUMP in
              major)
                echo "## ⚠️ Suggested bump: \`major\`"
                echo ""
                echo "This PR contains **breaking changes** — increment the major version."
                printf "%b\n" "$BREAKING"
                ;;
              minor)
                echo "## ✨ Suggested bump: \`minor\`"
                echo ""
                echo "This PR adds **new functionality** — increment the minor version."
                printf "%b\n" "$FEATURES"
                ;;
              patch)
                echo "## 🔧 Suggested bump: \`patch\`"
                echo ""
                echo "This PR is a **fix or maintenance** change — increment the patch version."
                ;;
            esac
            echo ""
            echo "Tag the next release with: \`./scripts/bump-version.sh $BUMP\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

  # ── Job 3: Formula audit (requires macOS + Homebrew) ──────────────────────
  formula-audit:
    name: Formula Audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Audit formula style and correctness
        run: |
          # brew audit/style no longer accept file paths — must use formula name.
          # Tap the local checkout so we can reference it by name.
          brew tap amcheste/dev-env "$(pwd)"
          brew audit --strict amcheste/dev-env/dev-tools
          brew style amcheste/dev-env/dev-tools

  # ── Job 3: Integration test (macOS, CLI tools only) ────────────────────────
  integration:
    name: Integration Test
    runs-on: ${{ github.ref == 'refs/heads/main' && 'macos-15-xlarge' || 'macos-latest' }}
    needs: [lint, formula-audit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install CLI tools from Brewfile.ci
        run: |
          brew update
          brew bundle --file=Brewfile.ci --no-upgrade
        timeout-minutes: 30

      - name: Run install-dotfiles.sh
        run: bash scripts/install-dotfiles.sh

      - name: Assert dotfiles are symlinked correctly
        run: |
          echo "Checking symlinks..."
          test -L "$HOME/.zshrc"  || (echo "FAIL: ~/.zshrc is not a symlink"  && exit 1)
          test -L "$HOME/.vimrc"  || (echo "FAIL: ~/.vimrc is not a symlink"  && exit 1)
          echo "  ~/.zshrc  → $(readlink ~/.zshrc)"
          echo "  ~/.vimrc  → $(readlink ~/.vimrc)"
          echo "Symlinks OK ✓"

      - name: Assert ~/.secrets was created from template
        run: |
          test -f "$HOME/.secrets" || (echo "FAIL: ~/.secrets was not created" && exit 1)
          echo "~/.secrets exists ✓"

      - name: Assert ~/.secrets has correct permissions (600)
        run: |
          perms=$(stat -f "%Mp%Lp" "$HOME/.secrets")
          echo "~/.secrets permissions: $perms"
          test "$perms" = "0600" || (echo "FAIL: ~/.secrets should be 0600, got $perms" && exit 1)
          echo "~/.secrets permissions OK ✓"

      - name: Assert ~/.secrets contains no real credentials
        run: |
          # Template values should all be empty strings
          if grep -Eq '"[^"]{8,}"' "$HOME/.secrets"; then
            echo "WARNING: ~/.secrets may contain non-empty values (check if template was populated)"
          fi
          echo "~/.secrets credential check passed ✓"

      - name: Smoke-test installed tools
        run: |
          echo "Verifying key tools are on PATH..."
          command -v go        && go version
          command -v kubectl   && kubectl version --client
          command -v helm      && helm version
          command -v terraform && terraform version
          command -v doctl     && doctl version
          command -v jq        && jq --version
          command -v gh        && gh --version
          echo "All tools verified ✓"

      - name: Run preflight unit tests
        run: bash scripts/preflight-test.sh
