name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# в”Ђв”Ђ Auto-label PRs from conventional commit titles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
autolabeler:
  - label: 'breaking-change'
    title:
      - '/^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?!:/i'
  - label: 'feature'
    title:
      - '/^feat(\([^)]+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\([^)]+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\([^)]+\))?:/i'
  - label: 'chore'
    title:
      - '/^(chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?:/i'

# в”Ђв”Ђ Release note categories (driven by labels above) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
categories:
  - title: 'вљ пёЏ Breaking Changes'
    labels: ['breaking-change']
  - title: 'рџљЂ Features'
    labels: ['feature', 'enhancement']
  - title: 'рџђ› Bug Fixes'
    labels: ['fix', 'bug']
  - title: 'рџ“– Documentation'
    labels: ['docs', 'documentation']
  - title: 'рџ”§ Maintenance'
    labels: ['chore', 'dependencies', 'refactor']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

# в”Ђв”Ђ Version resolution (labels в†’ semver bump) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
version-resolver:
  major:
    labels: ['breaking-change']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['fix', 'bug', 'docs', 'documentation', 'chore', 'dependencies', 'refactor']
  default: patch

exclude-labels:
  - 'skip-changelog'

no-changes-template: '- No notable changes'

template: |
  $CHANGES
